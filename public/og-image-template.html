<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Template - Iðunn Garðarsdóttir</title>
  <!--
    Editorial minimalist OG image (1200x630), matching the site design.
    Regenerate public/og-image.png with headless Chrome:

      "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
        --headless --disable-gpu --hide-scrollbars \
        --window-size=1200,630 --virtual-time-budget=4000 \
        --screenshot=public/og-image.png \
        "file://$PWD/public/og-image-template.html"
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    .og-image {
      width: 1200px;
      height: 630px;
      background: #FAF8F5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 80px;
    }

    /* Thin editorial frame */
    .og-image::after {
      content: "";
      position: absolute;
      inset: 32px;
      border: 1px solid #E7E0D8;
      pointer-events: none;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #78716C;
      margin-bottom: 36px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 104px;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: #1C1917;
    }

    .divider {
      width: 64px;
      height: 1px;
      background: #B45309;
      margin: 36px 0;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 300;
      line-height: 1.4;
      color: #57534E;
      max-width: 820px;
    }

    .domain {
      position: absolute;
      bottom: 72px;
      right: 96px;
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #B45309;
    }
  </style>
</head>
<body>
  <div class="og-image">
    <p class="eyebrow">Prófarkalestur &mdash; Textagerð</p>
    <h1>Iðunn Garðarsdóttir</h1>
    <div class="divider"></div>
    <p class="subtitle">Prófarkalestur, textagerð og verkefnastjórn</p>
    <div class="domain">idunn.is</div>
  </div>
</body>
</html>
